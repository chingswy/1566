<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建 Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      min-height: 100vh;
      overflow-y: auto;
      background: linear-gradient(135deg, #f5f0e8 0%, #ede8dc 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px 0;
    }

    .create-agent-nav {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: center;
      padding: 20px 24px 8px;
      gap: 16px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14.4px;
      color: #86868b;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 0;
      transition: color 0.18s;
      font-family: inherit;
    }
    .back-btn:hover { color: #1d1d1f; }

    .create-agent-container {
      width: 100%;
      max-width: 760px;
      padding: 0 24px;
    }

    .create-agent-header {
      margin-bottom: 28px;
    }

    .create-agent-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 28.8px;
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    .create-agent-subtitle {
      font-size: 14.4px;
      color: #86868b;
    }

    .create-agent-form {
      background: rgba(255,255,255,0.76);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 32px 36px 28px;
    }

    .create-form-section {
      margin-bottom: 20px;
    }

    .create-form-section:last-of-type {
      margin-bottom: 0;
    }

    .create-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-actions-row {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding-top: 24px;
      border-top: 1px solid rgba(0,0,0,0.06);
      margin-top: 24px;
    }

    .btn-create {
      padding: 10px 28px;
      background: #1d1d1f;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14.4px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.18s, transform 0.1s;
    }
    .btn-create:hover { background: #3a3a3c; }
    .btn-create:active { transform: scale(0.98); }

    .btn-cancel-page {
      padding: 10px 20px;
      background: rgba(0,0,0,0.06);
      color: #3a3a3c;
      border: none;
      border-radius: 10px;
      font-size: 14.4px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.18s;
    }
    .btn-cancel-page:hover { background: rgba(0,0,0,0.10); }

    .agent-create-content {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12.8px;
      line-height: 1.6;
      resize: vertical;
    }

    .section-divider {
      border: none;
      border-top: 1px solid rgba(0,0,0,0.06);
      margin: 24px 0 20px;
    }

    .section-label {
      font-size: 11.2px;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="create-agent-nav">
    <button class="back-btn" id="back-btn">‹ 返回</button>
  </div>

  <div class="create-agent-container">
    <div class="create-agent-header">
      <div class="create-agent-title">新建 Agent</div>
      <div class="create-agent-subtitle">创建一位新的团队成员，定义其职责与专长</div>
    </div>

    <div class="create-agent-form">
      <!-- Copy from section -->
      <div class="create-form-section">
        <div class="section-label">模板来源</div>
        <div class="form-group">
          <label class="form-label">复制自（继承内容）</label>
          <select class="input-field" id="new-agent-template">
            <option value="">— 空白模板 —</option>
          </select>
          <div class="form-hint" style="margin-top:6px">选择后将继承该 agent 的描述、专长、标签和内容</div>
        </div>
      </div>

      <hr class="section-divider">

      <!-- Basic info section -->
      <div class="create-form-section">
        <div class="section-label">基本信息</div>
        <div class="create-form-row">
          <div class="form-group">
            <label class="form-label">Name <span class="form-hint">（仅小写字母/数字/连字符）</span></label>
            <input class="input-field" id="new-agent-name" placeholder="lowercase-with-dashes">
          </div>
          <div class="form-group">
            <label class="form-label">别名 <span class="form-hint">（可选，仅在网页显示）</span></label>
            <input class="input-field" id="new-agent-alias" placeholder="如：张居正、海瑞...">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input class="input-field" id="new-agent-desc" placeholder="What does this agent do?">
        </div>
        <div class="create-form-row">
          <div class="form-group">
            <label class="form-label">Expertise</label>
            <input class="input-field" id="new-agent-expertise" placeholder="comma-separated areas">
          </div>
          <div class="form-group">
            <label class="form-label">Tags</label>
            <input class="input-field" id="new-agent-tags" placeholder="comma-separated tags">
          </div>
        </div>
      </div>

      <hr class="section-divider">

      <!-- Content section -->
      <div class="create-form-section">
        <div class="section-label">Markdown 正文</div>
        <div class="form-hint" style="margin-bottom:10px">YAML header 由上方字段自动生成，此处只编辑正文部分</div>
        <div class="form-group">
          <textarea class="input-field agent-create-content" id="new-agent-content" rows="14" placeholder="正文内容（标题、职责说明等）..."></textarea>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions-row">
        <button class="btn-cancel-page" id="cancel-btn">取消</button>
        <button class="btn-create" id="create-btn">创建 Agent</button>
      </div>
    </div>
  </div>

  <script src="/static/api.js"></script>
  <script src="/static/utils.js"></script>
  <script src="/static/agent-components.js"></script>
  <script src="/static/agent-actions.js"></script>
  <script>
    // 根据外部字段生成 YAML frontmatter 字符串
    function buildFrontmatter(name, description, expertise, tags) {
      return `---
name: ${name || ''}
description: "${description || ''}"
role: worker
status: active
expertise: "${expertise || ''}"
tags: "${tags || ''}"
---`;
    }

    // 生成默认 body（不含 frontmatter）
    function buildDefaultBody(name, description, expertise) {
      const titleName = name
        ? name.split(/[-_]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')
        : 'New Agent';
      return `# ${titleName}

## 职责
${description || '描述该 agent 的职责。'}

## 专长领域
${expertise || '列出专长领域，逗号分隔。'}

## 工作原则
- 执行前必读自己的记忆（memory.md + 最近 records）
- 执行后必写记忆（add-record + 按需 update-memory）
- 可按需读取 attachments/ 下的共享知识文件
- 严格完成分配的子任务，不超出职责范围
`;
    }

    (async function() {
      await loadAgentLabels();

      const contentEl = document.getElementById('new-agent-content');

      // 初始化 body（模板来源选空时）
      function _resetBody() {
        const name = document.getElementById('new-agent-name')?.value.trim() || '';
        const desc = document.getElementById('new-agent-desc')?.value.trim() || '';
        const expertise = document.getElementById('new-agent-expertise')?.value.trim() || '';
        if (contentEl) contentEl.value = buildDefaultBody(name, desc, expertise);
      }
      _resetBody();

      // 当 name/desc/expertise 改变时，若 body 未手动编辑则同步更新 body 默认内容
      let _bodyUserEdited = false;
      if (contentEl) {
        contentEl.addEventListener('input', () => { _bodyUserEdited = true; });
      }

      function _onFieldInput() {
        if (_bodyUserEdited) return;
        _resetBody();
      }

      ['new-agent-name', 'new-agent-desc', 'new-agent-expertise'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', _onFieldInput);
      });

      // 加载模板 Agent 列表
      async function _loadTemplateAgents() {
        const select = document.getElementById('new-agent-template');
        if (!select) return;
        try {
          const res = await API.listAgents();
          if (res.code === 0 && res.data && res.data.length > 0) {
            res.data.forEach(agent => {
              const opt = document.createElement('option');
              opt.value = agent.name;
              opt.textContent = agent.name + (agent.description ? ` — ${agent.description}` : '');
              select.appendChild(opt);
            });
          }
        } catch (e) { /* ignore */ }
        select.addEventListener('change', _onTemplateChange);
      }

      // 模板选中：填充外部字段 + 将模板的 body 填入 textarea
      async function _onTemplateChange(e) {
        const agentName = e.target.value;
        if (!agentName) {
          _bodyUserEdited = false;
          _resetBody();
          ['new-agent-desc', 'new-agent-expertise', 'new-agent-tags'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
          });
          return;
        }
        try {
          const res = await API.getAgent(agentName);
          if (res.code === 0 && res.data) {
            const { meta, body } = parseAgentContent(res.data.full_content || '');
            if (meta) {
              if (meta.description) document.getElementById('new-agent-desc').value = meta.description;
              if (meta.expertise)   document.getElementById('new-agent-expertise').value = meta.expertise;
              if (meta.tags)        document.getElementById('new-agent-tags').value = meta.tags;
            }
            // body 部分填入 textarea
            if (contentEl) contentEl.value = body || '';
            _bodyUserEdited = true;
          }
        } catch (err) { /* ignore */ }
      }

      await _loadTemplateAgents();

      // 返回按钮
      document.getElementById('back-btn').addEventListener('click', () => {
        window.history.length > 1 ? history.back() : (location.href = '/');
      });

      // 取消按钮
      document.getElementById('cancel-btn').addEventListener('click', () => {
        location.href = '/';
      });

      // 创建按钮：用外部字段拼接 frontmatter + body → 发送
      document.getElementById('create-btn').addEventListener('click', async () => {
        const name        = document.getElementById('new-agent-name')?.value.trim();
        const description = document.getElementById('new-agent-desc')?.value.trim() || '';
        const expertise   = document.getElementById('new-agent-expertise')?.value.trim() || '';
        const tags        = document.getElementById('new-agent-tags')?.value.trim() || '';
        const body        = contentEl?.value || '';

        if (!name) {
          alert('Name 是必填项');
          return;
        }
        if (!/^[a-z][a-z0-9_-]*$/.test(name)) {
          alert('Name 必须以小写字母开头，只能包含小写字母、数字、连字符和下划线');
          return;
        }
        if (!description) {
          alert('请填写 Description');
          return;
        }

        // 用外部字段组装最终文件内容
        const finalContent = buildFrontmatter(name, description, expertise, tags) + '\n' + body;

        const createBtn = document.getElementById('create-btn');
        createBtn.disabled = true;
        createBtn.textContent = '创建中...';

        try {
          const res = await API.createAgent({ name, description, full_content: finalContent });
          if (res.code === 0) {
            const alias = document.getElementById('new-agent-alias')?.value.trim() || '';
            if (alias) await API.setAgentLabel(name, alias);
            location.href = '/';
          } else {
            alert(`创建失败: ${res.message}`);
            createBtn.disabled = false;
            createBtn.textContent = '创建 Agent';
          }
        } catch (err) {
          alert(`创建失败: ${err.message}`);
          createBtn.disabled = false;
          createBtn.textContent = '创建 Agent';
        }
      });
    })();
  </script>
</body>
</html>
